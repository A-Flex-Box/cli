version: '3.8'

services:
  monitor-test:
    build:
      context: ../..
      dockerfile: test/monitor/docker/Dockerfile
    container_name: cli-monitor-test
    hostname: monitor-test
    volumes:
      - ./output:/output
      - ./recordings:/recordings
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
      - DISPLAY=${DISPLAY:-}
    command: ["monitor"]